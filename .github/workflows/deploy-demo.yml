name: Deploy → Demo

on:
  push:
    branches: [demo]

env:
  GCP_PROJECT_ID: axel-ateam-demo
  GCP_REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  AMBIENTE: demo

jobs:
  deploy:
    name: Build & Deploy Demo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # requerido para Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Install gcloud CLI
        run: |
          curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts --install-dir=$HOME
          echo "$HOME/google-cloud-sdk/bin" >> $GITHUB_PATH

      - name: Auth en GCP via Workload Identity Federation
        run: |
          python3 infra/scripts/make_wif_creds.py
          $HOME/google-cloud-sdk/bin/gcloud auth login --cred-file=/tmp/wif-creds.json --quiet
          $HOME/google-cloud-sdk/bin/gcloud config set project axel-ateam-demo

      - name: Configure Docker para Artifact Registry
        run: $HOME/google-cloud-sdk/bin/gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & Push — receptor
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:latest \
            ./functions/receptor
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:latest

      - name: Build & Push — procesador
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:latest \
            ./functions/procesador
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:latest

      - name: Deploy receptor → Cloud Run demo
        run: |
          gcloud run deploy axel-receptor-demo \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --timeout 60 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars AMBIENTE=demo,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }} \
            --set-env-vars PROCESADOR_URL=${{ secrets.PROCESADOR_URL_DEMO }} \
            --set-env-vars CHATWOOT_URL=${{ secrets.CHATWOOT_URL_DEMO }} \
            --set-secrets META_VERIFY_TOKEN=meta-verify-token-demo:latest \
            --set-secrets META_ACCESS_TOKEN=meta-access-token-demo:latest

      - name: Deploy procesador → Cloud Run demo
        run: |
          gcloud run deploy axel-procesador-demo \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --timeout 300 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars AMBIENTE=demo,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }} \
            --set-env-vars CHATWOOT_URL=${{ secrets.CHATWOOT_URL_DEMO }} \
            --set-secrets ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --set-secrets META_ACCESS_TOKEN=meta-access-token-demo:latest \
            --set-secrets DB_HOST=db-host-demo:latest \
            --set-secrets DB_NAME=db-name-demo:latest \
            --set-secrets DB_USER=db-user-demo:latest \
            --set-secrets DB_PASSWORD=db-password-demo:latest \
            --set-secrets CHATWOOT_TOKEN=chatwoot-token-demo:latest \
            --set-secrets GCS_BUCKET=gcs-bucket-demo:latest

      - name: Mostrar URL del receptor
        run: |
          URL=$(gcloud run services describe axel-receptor-demo --region ${{ env.GCP_REGION }} --format='value(status.url)')
          echo "✅ Receptor URL: $URL"
          echo "📌 Webhook endpoint: $URL/webhook"
