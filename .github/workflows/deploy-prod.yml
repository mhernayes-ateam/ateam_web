name: Deploy → Production

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: axel-ateam-demo
  GCP_REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  AMBIENTE: production

jobs:
  deploy:
    name: Build & Deploy Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth en GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & Push — receptor
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:stable \
            ./functions/receptor
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:stable

      - name: Build & Push — procesador
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:stable \
            ./functions/procesador
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:stable

      - name: Deploy receptor → Cloud Run prod
        run: |
          gcloud run deploy axel-receptor-prod \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --timeout 60 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 20 \
            --set-env-vars AMBIENTE=production,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }} \
            --set-env-vars PROCESADOR_URL=${{ secrets.PROCESADOR_URL_PROD }} \
            --set-env-vars CHATWOOT_URL=${{ secrets.CHATWOOT_URL_PROD }} \
            --set-secrets META_VERIFY_TOKEN=meta-verify-token-prod:latest \
            --set-secrets META_ACCESS_TOKEN=meta-access-token-prod:latest

      - name: Deploy procesador → Cloud Run prod
        run: |
          gcloud run deploy axel-procesador-prod \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --timeout 300 \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --set-env-vars AMBIENTE=production \
            --set-env-vars CHATWOOT_URL=${{ secrets.CHATWOOT_URL_PROD }} \
            --set-secrets ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --set-secrets META_ACCESS_TOKEN=meta-access-token-prod:latest \
            --set-secrets DB_HOST=db-host-prod:latest \
            --set-secrets DB_NAME=db-name-prod:latest \
            --set-secrets DB_USER=db-user-prod:latest \
            --set-secrets DB_PASSWORD=db-password-prod:latest \
            --set-secrets CHATWOOT_TOKEN=chatwoot-token-prod:latest \
            --set-secrets GCS_BUCKET=gcs-bucket-prod:latest

      - name: Tag del deploy exitoso
        run: |
          echo "✅ PRODUCCIÓN desplegada" >> $GITHUB_STEP_SUMMARY
          echo "**SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Receptor**: $(gcloud run services describe axel-receptor-prod --region ${{ env.GCP_REGION }} --format='value(status.url)')" >> $GITHUB_STEP_SUMMARY
