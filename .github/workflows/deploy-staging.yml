name: Deploy → Staging

on:
  push:
    branches: [staging]

env:
  GCP_PROJECT_ID: axel-ateam-demo
  GCP_REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  AMBIENTE: staging

jobs:
  deploy:
    name: Build & Deploy Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Auth en GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & Push — receptor
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }} \
            ./functions/receptor
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }}

      - name: Build & Push — procesador
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }} \
            ./functions/procesador
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }}

      - name: Deploy receptor → Cloud Run staging
        run: |
          gcloud run deploy axel-receptor-staging \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/receptor:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --timeout 60 \
            --memory 256Mi \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars AMBIENTE=staging,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCP_REGION=${{ env.GCP_REGION }} \
            --set-env-vars PROCESADOR_URL=${{ secrets.PROCESADOR_URL_STAGING }} \
            --set-env-vars CHATWOOT_URL=${{ secrets.CHATWOOT_URL_STAGING }} \
            --set-secrets META_VERIFY_TOKEN=meta-verify-token-staging:latest \
            --set-secrets META_ACCESS_TOKEN=meta-access-token-staging:latest

      - name: Deploy procesador → Cloud Run staging
        run: |
          gcloud run deploy axel-procesador-staging \
            --image ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/axel/procesador:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --timeout 300 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars AMBIENTE=staging \
            --set-env-vars CHATWOOT_URL=${{ secrets.CHATWOOT_URL_STAGING }} \
            --set-secrets ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --set-secrets META_ACCESS_TOKEN=meta-access-token-staging:latest \
            --set-secrets DB_HOST=db-host-staging:latest \
            --set-secrets DB_NAME=db-name-staging:latest \
            --set-secrets DB_USER=db-user-staging:latest \
            --set-secrets DB_PASSWORD=db-password-staging:latest \
            --set-secrets CHATWOOT_TOKEN=chatwoot-token-staging:latest \
            --set-secrets GCS_BUCKET=gcs-bucket-staging:latest
