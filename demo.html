        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .nav-active {
            color: var(--primary) !important;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none !important;
            }

            .mobile-menu-btn {
                display: flex !important;
                color: #0D0F1A !important;
                min-width: 44px;
                min-height: 44px;
                align-items: center;
                justify-content: center;
                background: none;
                border: none;
                cursor: pointer;
            }

            .mobile-menu-btn svg {
                display: block !important;
                width: 24px !important;
                height: 24px !important;
                stroke: #0D0F1A !important;
            }
        }

        .demo-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 7rem 0 6rem;
            position: relative;
            overflow: hidden;
        }

        .demo-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 60% 60% at 80% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 70%),
                radial-gradient(ellipse 40% 50% at 10% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .demo-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
        }

        .demo-headline {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 1.25rem;
            line-height: 1.1;
        }

        .demo-subtext {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.75;
            margin-bottom: 2rem;
        }

        .demo-bullets {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-bottom: 2.5rem;
        }

        .demo-bullets li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .demo-bullets li svg {
            width: 18px;
            height: 18px;
            color: #10b981;
            flex-shrink: 0;
        }

        .demo-bullets li strong {
            color: var(--text-main);
        }

        /* Form card */
        .demo-form-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
        }

        .demo-form-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.4rem;
        }

        .demo-form-card .form-sub {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
        }

        .form-group select option {
            background: #0a0a0f;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 90px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-submit {
            width: 100%;
            margin-top: 0.5rem;
        }

        .form-note {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        /* Alt contact */
        .demo-alt {
            margin-top: 3rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .demo-alt a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .demo-alt a:hover {
            color: var(--primary);
        }

        .demo-alt a svg {
            width: 16px;
            height: 16px;
        }

        /* Success state */
        .form-success {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }

        .form-success svg {
            width: 48px;
            height: 48px;
            color: #10b981;
            margin-bottom: 1rem;
        }

        .form-success h4 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .form-success p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 1024px) {
            .demo-grid {
                grid-template-columns: 1fr;
                gap: 3rem;
            }

            .demo-headline {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo" aria-label="A-Team home">
                <picture>
                    <source media="(max-width: 768px)" srcset="assets/img/isotipo.png">
                    <source media="(min-width: 769px)" srcset="assets/img/isologo-transparente.png">
                    <img src="assets/img/isologo-transparente.png" alt="A Team" class="nav-logo-img">
                </picture>
            </a>
            <div class="nav-links">
                <a href="index.html"><span data-lang="es">Inicio</span><span data-lang="en">Home</span></a>
                <a href="axel.html"><span data-lang="es">Axel — Cobrador</span><span data-lang="en">Axel — Collections</span></a>
                    <a href="anibal.html"><span data-lang="es">Aníbal — Líder de Report</span><span data-lang="en">Aníbal — Lead Reporter</span></a>
                    <a href="#"><span data-lang="es">Alma — Ventas (pronto)</span><span data-lang="en">Alma — Sales (soon)</span></a>
                </div>
                <div class="footer-col">
                    <h5><span data-lang="es">Compañía</span><span data-lang="en">Company</span></h5>
                    <a href="index.html"><span data-lang="es">Sobre A-Team</span><span data-lang="en">About A-Team</span></a>
                    <a href="pricing.html">Pricing</a>
                    <a href="demo.html"><span data-lang="es">Agendar Demo</span><span data-lang="en">Book a Demo</span></a>
                </div>
                <div class="footer-col">
                    <h5><span data-lang="es">Legales</span><span data-lang="en">Legal</span></h5>
                    <a href="terms.html"><span data-lang="es">Términos y Condiciones</span><span data-lang="en">Terms &amp; Conditions</span></a>
                    <a href="privacy.html"><span data-lang="es">Política de Privacidad</span><span data-lang="en">Privacy Policy</span></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        const menuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('open'));
            mobileMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', () => mobileMenu.classList.remove('open')));
        }
        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in, .fade-in-up').forEach(el => observer.observe(el));
        window.addEventListener('scroll', () => { document.querySelector('.navbar').classList.toggle('scrolled', window.scrollY > 50); });

        // Form submit (simulated)
        document.getElementById('demoForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = document.body.classList.contains('lang-en') ? 'Sending...' : 'Enviando...';
            btn.disabled = true;
            setTimeout(() => {
                this.style.display = 'none';
                document.getElementById('formSuccess').style.display = 'block';
                lucide.createIcons();

            }, 1200);
        });
    </script>
    <script src="assets/js/lang.js"></script>
</body>

</html>
